<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxy Config Dashboard</title>
  </head>
  {% include "proxy_config_frag.html" %}
  <script src="/assets/js/tailwindcss.js" defer></script>
  <script src="/assets/js/alpinejs.js" defer></script>
  <script>
    function proxyForm() {
      return {
        entries: [],
        fetchData() {
          fetch(`http://127.0.0.1:8009/api/proxy-config`)
            .then((response) => response.json())
            .then((data) => {
              this.entries = data;
            })
            .catch((error) => console.error("Error fetching proxy config:", error));
        }
      };
    }
  </script>
</html>
